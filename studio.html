<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Content Studio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@700;800;900&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0f12;--bg2:#111419;--panel:#161a20;--panel2:#1d222b;--line:#232833;--line2:#2e3542;
  --ink:#e8eaf0;--mut:#9aa3b2;--dim:#5c6675;--amber:#ffb224;--ok:#4ade80;--err:#f87171;--busy:#60a5fa;
  --disp:'Archivo',sans-serif;--body:'DM Sans',sans-serif;--mono:'JetBrains Mono',monospace;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{background:var(--bg);color:var(--ink);font-family:var(--body);font-size:14px}
button{font-family:var(--body);cursor:pointer;border:0;background:none;color:inherit}
input,select{background:var(--panel2);border:1px solid var(--line2);border-radius:8px;color:var(--ink);padding:9px 11px;font-family:var(--body);font-size:13px;width:100%;outline:none}
input:focus{border-color:var(--amber)}
label{display:block;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px;font-family:var(--mono)}
.field{margin-bottom:14px}
::-webkit-scrollbar{width:8px;height:8px}::-webkit-scrollbar-thumb{background:var(--line2);border-radius:4px}

#app{display:grid;grid-template-columns:270px 1fr 320px;height:100vh}

/* LEFT: folders + library */
#left{border-right:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column;overflow:hidden}
#logo{padding:20px;font-family:var(--disp);font-weight:900;font-size:19px;letter-spacing:.02em}
#logo span{color:var(--amber)}
#logo .sub{display:block;font-family:var(--mono);font-size:9px;color:var(--dim);letter-spacing:.18em;margin-top:2px;font-weight:400}
#syncbar{margin:0 20px 12px;padding:9px 12px;border:1px solid var(--line2);border-radius:9px;font-family:var(--mono);font-size:10.5px;line-height:1.6;color:var(--mut)}
#syncbar.ok{border-color:rgba(74,222,128,.35)}
#syncbar b{color:var(--ok);font-weight:500}
#syncbar .t{color:var(--dim)}
#folderList{padding:0 20px}
.fol{display:flex;align-items:center;gap:8px;padding:8px 10px;border:1px solid var(--line2);border-radius:8px;margin-bottom:8px;font-size:12.5px}
.fol .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.fol .ct{font-family:var(--mono);font-size:10px;color:var(--dim)}
.fol .x{color:var(--dim);font-size:15px;padding:0 3px}
.fol .x:hover{color:var(--err)}
.fol.stale{border-color:rgba(255,178,36,.45)}
.fol.stale .rc{color:var(--amber);font-family:var(--mono);font-size:10px}
#btns{padding:4px 20px 12px;display:flex;gap:8px}
.btn{padding:9px 13px;border:1px solid var(--line2);border-radius:8px;font-size:12.5px;font-weight:500;color:var(--mut);transition:.2s}
.btn:hover{color:var(--ink);border-color:var(--amber)}
.btn.primary{background:var(--amber);color:#111;border-color:var(--amber);font-weight:700}
#q{margin:0 20px 10px;width:calc(100% - 40px)}
#lib{flex:1;overflow-y:auto;padding:0 14px 20px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px;align-content:start}
.th{position:relative;aspect-ratio:1;border-radius:7px;overflow:hidden;background:var(--panel2);border:2px solid transparent;cursor:pointer}
.th img,.th video{width:100%;height:100%;object-fit:cover;display:block}
.th.sel{border-color:var(--amber)}
.th .k{position:absolute;top:3px;left:3px;background:rgba(0,0,0,.65);font-family:var(--mono);font-size:8px;padding:1px 5px;border-radius:4px;color:#fff}
#libEmpty{grid-column:1/-1;color:var(--dim);font-size:12.5px;padding:26px 10px;text-align:center;border:1px dashed var(--line2);border-radius:10px}

/* CENTER: canvas */
#mid{display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:10px;padding:14px 22px;border-bottom:1px solid var(--line)}
#fmtTabs{display:flex;gap:6px}
.ftab{padding:8px 14px;border:1px solid var(--line2);border-radius:8px;font-size:12.5px;color:var(--mut)}
.ftab.on{background:var(--panel2);color:var(--amber);border-color:var(--amber)}
#sizeTabs{display:flex;gap:6px;margin-left:auto}
.stab{padding:8px 12px;border:1px solid var(--line2);border-radius:8px;font-family:var(--mono);font-size:11px;color:var(--mut)}
.stab.on{color:var(--amber);border-color:var(--amber)}
.navlink{font-size:12px;color:var(--dim);text-decoration:none;padding:8px 10px}
.navlink:hover{color:var(--amber)}
#stage{flex:1;display:flex;align-items:center;justify-content:center;overflow:auto;padding:26px;background:
  radial-gradient(circle at 50% 40%,#151920 0%,var(--bg) 70%)}
#cv{box-shadow:0 20px 60px rgba(0,0,0,.55);border-radius:4px;max-width:100%;max-height:100%}

/* RIGHT */
#rail{border-left:1px solid var(--line);background:var(--bg2);display:flex;flex-direction:column;overflow-y:auto}
#rail h3{padding:20px 20px 10px;font-family:var(--disp);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.16em;color:var(--amber)}
#rail .bx{padding:0 20px 8px}
#slots{display:flex;flex-wrap:wrap;gap:7px;padding:0 20px 12px}
.slot{width:52px;height:52px;border:1.5px dashed var(--line2);border-radius:8px;overflow:hidden;position:relative;cursor:pointer;background:var(--panel2)}
.slot img{width:100%;height:100%;object-fit:cover}
.slot.active{border:1.5px solid var(--amber);box-shadow:0 0 8px rgba(255,178,36,.35)}
.slot .n{position:absolute;bottom:1px;right:4px;font-family:var(--mono);font-size:8px;color:var(--dim)}
#hint{padding:0 20px 10px;font-size:11.5px;color:var(--dim);line-height:1.55}
#exp{padding:14px 20px;border-top:1px solid var(--line);margin-top:auto}
#exportBtn{width:100%;padding:14px;background:var(--amber);color:#111;font-family:var(--disp);font-weight:900;font-size:14px;border-radius:10px;letter-spacing:.05em}
#exportAll{width:100%;padding:10px;margin-top:8px;border:1px solid var(--line2);border-radius:10px;color:var(--mut);font-size:12.5px}
#exportAll:hover{color:var(--ink);border-color:var(--amber)}
#log{padding:8px 20px 16px;font-family:var(--mono);font-size:10.5px;color:var(--dim);line-height:1.7;max-height:120px;overflow-y:auto}
.lok{color:var(--ok)}
</style>
</head>
<body>
<div id="app">

  <div id="left">
    <div id="logo">CONTENT<span>STUDIO</span><span class="sub">FOLDER-SYNCED · LOCAL</span></div>
    <div id="syncbar"><span class="t">no folders connected</span></div>
    <div id="folderList"></div>
    <div id="btns">
      <button class="btn primary" onclick="addFolder()">+ Connect folder</button>
      <button class="btn" onclick="resyncAll()">Re-sync</button>
    </div>
    <input id="q" placeholder="Search files..." oninput="paintLib()">
    <div id="lib"><div id="libEmpty">Connect a folder — every image and video in it (subfolders included) lands here automatically on every visit.</div></div>
  </div>

  <div id="mid">
    <div id="topbar">
      <div id="fmtTabs">
        <button class="ftab on" data-f="lineup" onclick="setFmt('lineup')">Line-up</button>
        <button class="ftab" data-f="trio" onclick="setFmt('trio')">Trio</button>
        <button class="ftab" data-f="polaroid" onclick="setFmt('polaroid')">Polaroid-6</button>
        <button class="ftab" data-f="hero" onclick="setFmt('hero')">Hero</button>
      </div>
      <div id="sizeTabs">
        <button class="stab on" data-s="feed" onclick="setSize('feed')">1:1 FEED</button>
        <button class="stab" data-s="story" onclick="setSize('story')">9:16 STORY</button>
      </div>
      <a class="navlink" href="index.html">← Launcher</a>
    </div>
    <div id="stage"><canvas id="cv" width="1080" height="1080"></canvas></div>
  </div>

  <div id="rail">
    <h3>Board</h3>
    <div id="slots"></div>
    <div id="hint">Click a slot, then click a product in the library to drop it in. Slots fill in order if none selected.</div>
    <h3>Copy</h3>
    <div class="bx"><div class="field"><label>Descriptor label</label><input id="inLabel" value="OFF-WHITE & GREY" oninput="draw()"></div>
    <div class="field"><label>Headline</label><input id="inHead" value="THE COTTON EDIT" oninput="draw()"></div>
    <div class="field"><label>Sub line</label><input id="inSub" value="new season · shop online" oninput="draw()"></div>
    <div class="field"><label>Accent</label><select id="inAcc" onchange="draw()">
      <option value="#ffb224">Amber</option><option value="#1f6feb">Blue</option>
      <option value="#e5484d">Red</option><option value="#111111">Black</option>
    </select></div></div>
    <div id="exp">
      <button id="exportBtn" onclick="exportPNG()">SAVE PNG</button>
      <button id="exportAll" onclick="exportBoth()">Export feed + story</button>
    </div>
    <div id="log"></div>
  </div>
</div>

<script>
/* ================= STATE ================= */
const S={files:[],folders:[],fmt:'lineup',size:'feed',slots:[null,null,null,null,null,null],activeSlot:-1};
const EXT_IMG=/\.(jpe?g|png|webp|gif|avif)$/i, EXT_VID=/\.(mp4|mov|webm|m4v)$/i;
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
const log=m=>{const d=document.getElementById('log');d.innerHTML='<div>'+m+'</div>'+d.innerHTML};

/* ================= IndexedDB folder handles ================= */
const idb=()=>new Promise((res,rej)=>{const r=indexedDB.open('studio_db',1);
  r.onupgradeneeded=()=>r.result.createObjectStore('folders');
  r.onsuccess=()=>res(r.result); r.onerror=()=>rej(r.error)});
async function idbAll(){const db=await idb();return new Promise(res=>{const t=db.transaction('folders').objectStore('folders');
  const out=[];const c=t.openCursor();c.onsuccess=()=>{const cu=c.result;if(cu){out.push({key:cu.key,handle:cu.value});cu.continue()}else res(out)}})}
async function idbPut(k,v){const db=await idb();return new Promise(res=>{const t=db.transaction('folders','readwrite');t.objectStore('folders').put(v,k);t.oncomplete=res})}
async function idbDel(k){const db=await idb();return new Promise(res=>{const t=db.transaction('folders','readwrite');t.objectStore('folders').delete(k);t.oncomplete=res})}

/* ================= FOLDER SYNC ================= */
async function addFolder(){
  if(!window.showDirectoryPicker){alert('This browser lacks the File System Access API. Use Chrome/Edge.');return}
  try{
    const h=await showDirectoryPicker({mode:'read'});
    await idbPut(h.name+'_'+Date.now(),h);
    await resyncAll();
  }catch(e){/* user cancelled */}
}
async function walk(dir,path,out){
  for await(const [name,h] of dir.entries()){
    if(h.kind==='file'&&(EXT_IMG.test(name)||EXT_VID.test(name))){
      const f=await h.getFile();
      out.push({name,path:path+'/'+name,kind:EXT_VID.test(name)?'video':'image',file:f,url:URL.createObjectURL(f)});
    }else if(h.kind==='directory'){await walk(h,path+'/'+name,out)}
  }
}
async function resyncAll(){
  const t0=performance.now();
  const rows=await idbAll();
  S.files.forEach(f=>URL.revokeObjectURL(f.url)); S.files=[]; S.folders=[];
  for(const {key,handle} of rows){
    let perm=await handle.queryPermission({mode:'read'});
    if(perm!=='granted'){ perm=await handle.requestPermission({mode:'read'}).catch(()=>'denied'); }
    if(perm!=='granted'){ S.folders.push({key,name:handle.name,count:0,stale:true,handle}); continue }
    const out=[];
    try{ await walk(handle,handle.name,out) }catch(e){ S.folders.push({key,name:handle.name,count:0,stale:true,handle}); continue }
    S.files.push(...out);
    S.folders.push({key,name:handle.name,count:out.length,stale:false,handle});
  }
  const ms=Math.round(performance.now()-t0);
  const bar=document.getElementById('syncbar');
  if(S.folders.length){
    bar.className='ok';
    bar.innerHTML='<b>synced</b> '+S.files.length+' files · '+S.folders.length+' folder'+(S.folders.length>1?'s':'')+' · <b>'+(ms<1000?ms+'ms':(ms/1000).toFixed(1)+'s')+'</b><br><span class="t">last sync '+new Date().toLocaleTimeString()+'</span>';
    log('sync: '+S.files.length+' files in <span class="lok">'+ms+'ms</span>');
  } else { bar.className=''; bar.innerHTML='<span class="t">no folders connected</span>'; }
  paintFolders(); paintLib();
}
function paintFolders(){
  document.getElementById('folderList').innerHTML=S.folders.map(f=>
    '<div class="fol'+(f.stale?' stale':'')+'"><span class="nm">'+f.name+'</span>'+
    (f.stale?'<button class="rc" onclick="resyncAll()">reconnect</button>':'<span class="ct">'+f.count+'</span>')+
    '<button class="x" onclick="dropFolder(\''+f.key+'\')">×</button></div>').join('');
}
async function dropFolder(k){await idbDel(k);await resyncAll()}

/* ================= LIBRARY ================= */
function paintLib(){
  const q=document.getElementById('q').value.toLowerCase();
  const el=document.getElementById('lib');
  const items=S.files.filter(f=>!q||f.path.toLowerCase().includes(q));
  if(!items.length){el.innerHTML='<div id="libEmpty">'+(S.files.length?'No matches.':'Connect a folder — every image and video in it (subfolders included) lands here automatically on every visit.')+'</div>';return}
  el.innerHTML=items.slice(0,400).map((f,i)=>{
    const idx=S.files.indexOf(f);
    const inner=f.kind==='image'?'<img loading="lazy" src="'+f.url+'">':'<video preload="metadata" src="'+f.url+'#t=0.1" muted></video>';
    return '<div class="th" onclick="pick('+idx+')">'+inner+'<span class="k">'+f.kind.toUpperCase().slice(0,3)+'</span></div>';
  }).join('');
}
function pick(i){
  const f=S.files[i]; if(!f)return;
  let s=S.activeSlot;
  if(s<0){ s=S.slots.findIndex(x=>x===null); if(s<0)s=0 }
  S.slots[s]=f; S.activeSlot=-1;
  paintSlots(); draw();
}
function paintSlots(){
  const need=S.fmt==='polaroid'?6:(S.fmt==='hero'?1:(S.fmt==='trio'?3:4));
  document.getElementById('slots').innerHTML=S.slots.slice(0,need).map((f,i)=>
    '<div class="slot'+(i===S.activeSlot?' active':'')+'" onclick="selSlot('+i+')">'+(f?'<img src="'+f.url+'">':'')+'<span class="n">'+(i+1)+'</span></div>').join('');
}
function selSlot(i){S.activeSlot=S.activeSlot===i?-1:i;paintSlots()}

/* ================= CANVAS ================= */
const IMGC=new Map();
function loadImg(f){return IMGC.has(f.url)?Promise.resolve(IMGC.get(f.url)):new Promise(res=>{
  if(f.kind==='video'){const v=document.createElement('video');v.src=f.url;v.muted=true;v.currentTime=.1;
    v.onloadeddata=()=>{const c=document.createElement('canvas');c.width=v.videoWidth;c.height=v.videoHeight;
    c.getContext('2d').drawImage(v,0,0);const im=new Image();im.onload=()=>{IMGC.set(f.url,im);res(im)};im.src=c.toDataURL()};
    v.onerror=()=>res(null);return}
  const im=new Image();im.onload=()=>{IMGC.set(f.url,im);res(im)};im.onerror=()=>res(null);im.src=f.url})}
/* cover-draw with inset zoom to cut studio white edges */
function coverZoom(c,im,x,y,w,h,zoom=1.12){
  const r=Math.max(w/im.width,h/im.height)*zoom;
  const sw=w/r,sh=h/r,sx=(im.width-sw)/2,sy=(im.height-sh)/2;
  c.save();c.beginPath();c.rect(x,y,w,h);c.clip();c.drawImage(im,sx,sy,sw,sh,x,y,w,h);c.restore();
}
function setFmt(f){S.fmt=f;document.querySelectorAll('.ftab').forEach(b=>b.classList.toggle('on',b.dataset.f===f));paintSlots();draw()}
function setSize(s){S.size=s;document.querySelectorAll('.stab').forEach(b=>b.classList.toggle('on',b.dataset.s===s));draw()}
function chip(c,txt,x,y,acc){
  c.font='700 30px "JetBrains Mono",monospace';const w=c.measureText(txt).width+44;
  c.fillStyle=acc;c.fillRect(x,y,w,58);
  c.fillStyle=acc==='#111111'?'#fff':'#111';c.textBaseline='middle';c.textAlign='left';c.fillText(txt,x+22,y+31);
  return w;
}
async function draw(){
  const W=1080,H=S.size==='feed'?1080:1920;cv.width=W;cv.height=H;
  const acc=document.getElementById('inAcc').value;
  const label=document.getElementById('inLabel').value.toUpperCase();
  const head=document.getElementById('inHead').value.toUpperCase();
  const sub=document.getElementById('inSub').value;
  const need=S.fmt==='polaroid'?6:(S.fmt==='hero'?1:(S.fmt==='trio'?3:4));
  const imgs=[];for(let i=0;i<need;i++){imgs.push(S.slots[i]?await loadImg(S.slots[i]):null)}
  ctx.fillStyle='#f4f3f0';ctx.fillRect(0,0,W,H);
  const pad=54, topY=pad, contentTop=topY+110, footH=210, contentH=H-contentTop-footH;

  if(S.fmt==='hero'){
    if(imgs[0])coverZoom(ctx,imgs[0],0,0,W,H,1.06);
    ctx.fillStyle='rgba(0,0,0,.25)';ctx.fillRect(0,H-330,W,330);
    chip(ctx,label,pad,pad,acc);
    ctx.fillStyle='#fff';ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.font='900 86px Archivo,sans-serif';ctx.fillText(head,pad,H-150);
    ctx.font='500 34px "DM Sans",sans-serif';ctx.fillText(sub,pad,H-88);
  }else if(S.fmt==='polaroid'){
    const cols=2,rows=3,gx=34,gy=44;
    const cw=(W-pad*2-gx)/cols, chh=(contentH-gy*2)/rows;
    for(let i=0;i<6;i++){
      const col=i%2,row=(i/2)|0;
      const x=pad+col*(cw+gx), y=contentTop+row*(chh+gy);
      ctx.save();ctx.translate(x+cw/2,y+chh/2);ctx.rotate((i%2?1:-1)*0.015);
      ctx.shadowColor='rgba(0,0,0,.18)';ctx.shadowBlur=18;ctx.shadowOffsetY=8;
      ctx.fillStyle='#fff';ctx.fillRect(-cw/2,-chh/2,cw,chh);ctx.shadowColor='transparent';
      const bw=cw-36, bh=chh-70;
      if(imgs[i])coverZoom(ctx,imgs[i],-cw/2+18,-chh/2+18,bw,bh);
      else{ctx.fillStyle='#eceae6';ctx.fillRect(-cw/2+18,-chh/2+18,bw,bh)}
      ctx.restore();
    }
    chip(ctx,label,pad,topY,acc);
    ctx.fillStyle='#111';ctx.textAlign='left';
    ctx.font='900 64px Archivo,sans-serif';ctx.fillText(head,pad,H-118);
    ctx.font='500 30px "DM Sans",sans-serif';ctx.fillStyle='#666';ctx.fillText(sub,pad,H-64);
  }else{
    const n=S.fmt==='trio'?3:4, g=26;
    if(S.size==='feed'){
      const cw=(W-pad*2-g*(n-1))/n, chh=contentH;
      for(let i=0;i<n;i++){
        const x=pad+i*(cw+g), big=(S.fmt==='trio'&&i===1)?1:0;
        const y=contentTop+(big?-26:0), hh=chh+(big?52:0);
        ctx.shadowColor='rgba(0,0,0,.15)';ctx.shadowBlur=22;ctx.shadowOffsetY=10;
        ctx.fillStyle='#fff';ctx.fillRect(x,y,cw,hh);ctx.shadowColor='transparent';
        if(imgs[i])coverZoom(ctx,imgs[i],x+10,y+10,cw-20,hh-20);
        else{ctx.fillStyle='#eceae6';ctx.fillRect(x+10,y+10,cw-20,hh-20)}
      }
    }else{
      const rows2=n, ch2=(contentH-g*(rows2-1))/rows2;
      for(let i=0;i<n;i++){
        const y=contentTop+i*(ch2+g);
        ctx.shadowColor='rgba(0,0,0,.15)';ctx.shadowBlur=22;ctx.shadowOffsetY=10;
        ctx.fillStyle='#fff';ctx.fillRect(pad,y,W-pad*2,ch2);ctx.shadowColor='transparent';
        if(imgs[i])coverZoom(ctx,imgs[i],pad+10,y+10,W-pad*2-20,ch2-20);
        else{ctx.fillStyle='#eceae6';ctx.fillRect(pad+10,y+10,W-pad*2-20,ch2-20)}
      }
    }
    chip(ctx,label,pad,topY,acc);
    ctx.fillStyle='#111';ctx.textAlign='left';ctx.textBaseline='alphabetic';
    ctx.font='900 70px Archivo,sans-serif';ctx.fillText(head,pad,H-118);
    ctx.font='500 30px "DM Sans",sans-serif';ctx.fillStyle='#666';ctx.fillText(sub,pad,H-64);
  }
}

/* ================= EXPORT ================= */
function dl(name){cv.toBlob(b=>{const a=document.createElement('a');a.href=URL.createObjectURL(b);a.download=name;a.click()},'image/png')}
async function exportPNG(){await draw();dl(S.fmt+'_'+S.size+'_'+Date.now()+'.png');log('exported '+S.fmt+' '+S.size)}
async function exportBoth(){
  const cur=S.size;
  setSize('feed');await draw();await new Promise(r=>setTimeout(r,120));dl(S.fmt+'_feed_'+Date.now()+'.png');
  await new Promise(r=>setTimeout(r,350));
  setSize('story');await draw();await new Promise(r=>setTimeout(r,120));dl(S.fmt+'_story_'+Date.now()+'.png');
  setSize(cur);log('exported feed + story');
}

/* ================= INIT ================= */
(async()=>{
  paintSlots();draw();
  try{
    const rows=await idbAll();
    if(rows.length){
      // silent auto-sync for folders whose permission survived
      let granted=0;
      for(const {handle} of rows){ if(await handle.queryPermission({mode:'read'})==='granted') granted++ }
      if(granted===rows.length && rows.length>0){ await resyncAll() }
      else{
        S.folders=rows.map(r=>({key:r.key,name:r.handle.name,count:0,stale:true,handle:r.handle}));
        paintFolders();
        document.getElementById('syncbar').innerHTML='<span class="t">'+rows.length+' saved folder'+(rows.length>1?'s':'')+' — click <b style="color:var(--amber)">Re-sync</b> to reconnect (browser asks once)</span>';
      }
    }
  }catch(e){}
})();
</script>
</body>
</html>
